#############
# HYDRA CFG #
#############

# general
#########
experiment_dir: experiments_logs/${experiment_name}/logs/${task_cfg.task_name}/${algo_cfg.algo_name}/jax/${now:%Y-%m-%d}/${now:%H-%M-%S}

# launches
##########
defaults:
  - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: ${experiment_dir}/${hydra:job.num}
  
  sweep:
    dir: ${experiment_dir}
    subdir: ${hydra:job.num}
    
log_dir: ${hydra:run.dir}
verbose: True

##################
# EXPERIMENT CFG #
##################

# general
#########
seed: 0
experiment_name: control

# configuration of the task
###########################
dataset_type: fix
task_cfg:
  task_name: mujoco_halfcheetah-${dataset_type}
  env:
    classname: sciql.envs.diverse_mujoco.envs.DiverseMujoco_Environment
    env_name: 'HalfCheetah-Mujoco'

# configuration of the agent
############################
agent_cfg:
  
  agents_db:
    classname: sciql.data.agents_db.jax.JaxAgentsDB
    directory: ${log_dir}/agents_db
  
  agent:
    classname: sciql.algorithms.jax.offline_rl.sorl.agents.SORL_Agent
    # Seeding
    seed: ${seed}
    # Architecture
    hidden_dims: [256, 256]
    label_embed_dim: 16
    layer_norm: True
    lc_encoder: 'embedding'
    # Algorithm
    label_prob_type: 'ind'
    expectile: 0.7
    beta: 3.0
    tau: 0.005
    discount: 0.99
    train_task: True
    labels_names: ${algo_cfg.train_labels_names}
    rewards_names: ${algo_cfg.train_rewards_names}
    tree: ${algo_cfg.tree}
    # Optimization
    mine_lr: 3e-4
    actor_lr: 3e-4
    value_lr: 3e-4
    critic_lr: 3e-4
    batch_size: 256
    opt_decay_schedule: True
    mine_max_steps: 100_000
    mine_n_jitted_updates: 10
    mine_jitted_sampling: True
    policy_max_steps: 1_000_000
    policy_n_jitted_updates: 10
    policy_jitted_sampling: True
    # Advantage normalization (EMA)
    adv_norm_enable: False                # turn on EMA normalization
    adv_norm_low_q: 0.0                   # lower quantile (for A_min)
    adv_norm_high_q: 1.0                  # upper quantile (for A_max)
    adv_norm_alpha: 0.1                   # EMA update rate
    adv_norm_symmetric: True              # if True, use symmetric ±M via |A| quantile
    adv_norm_use_norm_in_weight: False    # if True, use A_norm in exp weight; else keep raw A with beta
    adv_norm_init_abs: 1.0                # initial bound if no history
    adv_norm_eps: 1e-6                    # numerical epsilon
    adv_norm_type: 'scaling'              # Apply bounded normalization or scaling normalization

# configuration of the algorithm
################################
algo_cfg:

  # Tree, ie. the expression that translates the preferences (within reward, joint_label, reward > joint_label and joint_label > reward)
  tree: joint_label
  # List of the labels, with their reading order giving their index
  train_labels_names: [speed_label]
  # List of the task rewards, usually one only reward or None
  train_rewards_names: [reward]
  
  algo_name: sorl
  log_interval: 1e3
  seed: ${seed}
  verbose: ${verbose}
  eval_init: False
  eval_interval: 1e6
  save_interval: 1e6
  jax_deterministic: False

  trainer:
    classname: sciql.algorithms.jax.offline_rl.sorl.trainers.SORL_Trainer

  sampler:
    classname: sciql.algorithms.jax.offline_rl.sorl.samplers.diverse_mujoco_samplers.DiverseMujoco_Sampler
    episodes_db:
      classname: sciql.data.episodes_db.diverse_mujoco.episodes_db.DiverseMujoco_EpisodesDB
      dataset_dir: 'diverse_mujoco/${task_cfg.task_name}'
    env: ${task_cfg.env}
    labels: ${algo_cfg.train_labels_names}
    # Data augmentation
    terminate_on_end: True
    clip_to_eps: True
    eps: 1e-5
    normalize_state: False
    normalize_reward_by_rewards: False
    shift_rewards: False
    normalize_reward_by_returns: True
    # Relabeling
    value_p_curlabel: 0.0
    value_p_trajlabel: 0.0
    value_p_randomlabel: 1.0
    value_geom_lambda: 0.99
    value_dist_max: 1000
    value_geom_sample: False
    actor_p_curlabel: 0.0
    actor_p_trajlabel: 0.0
    actor_p_randomlabel: 1.0
    actor_geom_lambda: 0.99
    actor_dist_max: 1000
    actor_geom_sample: False

# configuration of the experiment
##################################
evaluations_cfg:

  - classname: experiments.control.evaluations.Control_Evaluation
    evaluation_cfg:
      env: ${task_cfg.env}
      task_name: ${task_cfg.task_name}
      seed: ${seed}
      n_episodes: 10
      n_video_episodes: 0
      video_path: ${log_dir}/logs/videos
      agent_reset_args: {}
      agent_eval_mode_args: {}
      verbose: ${verbose}
      render: False
      statistics: []
      eval_labels_names: ${algo_cfg.train_labels_names}
      eval_labels_idxs: [null]